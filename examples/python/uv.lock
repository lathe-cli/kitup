version = 1
revision = 3
requires-python = ">=3.10"

[[package]]
name = "kitup-example-python"
version = "0.0.0"
source = { virtual = "." }
dependencies = [
    { name = "kitup-sdk" },
]

[package.metadata]
requires-dist = [{ name = "kitup-sdk", directory = "../../python" }]

[[package]]
name = "kitup-sdk"
version = "0.1.3"
source = { directory = "../../python" }

[package.metadata]
requires-dist = [
    { name = "pytest", marker = "extra == 'dev'", specifier = ">=8.3.0" },
    { name = "ruff", marker = "extra == 'dev'", specifier = ">=0.12.0" },
]
provides-extras = ["dev"]

[package.metadata.requires-dev]
dev = [
    { name = "pytest", specifier = ">=8.3.0" },
    { name = "ruff", specifier = ">=0.12.0" },
]
