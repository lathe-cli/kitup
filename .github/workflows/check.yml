name: check

on:
  pull_request:
  push:

jobs:
  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check source data
        run: node scripts/check.mjs source
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate
      - name: Check TypeScript SDK
        run: node scripts/check.mjs typescript
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Check Go SDKs
        run: node scripts/check.mjs go
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal
      - name: Check Rust SDK
        run: node scripts/check.mjs rust
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v5
      - name: Check Python SDK
        run: node scripts/check.mjs python
  python-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Test Python SDK
        run: uv run --directory python --python ${{ matrix.python-version }} pytest tests -q
  check:
    runs-on: ubuntu-latest
    needs:
      - source
      - typescript
      - go
      - rust
      - python
      - python-compat
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        run: test "${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}" = "true"
